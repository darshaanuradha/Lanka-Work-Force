<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookings - Lanka Work Force</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+Sinhala:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'], sinhala: ['Noto Sans Sinhala', 'sans-serif'] }, colors: { primary: '#1e3a5f', secondary: '#f59e0b', accent: '#10b981', lightbg: '#f8fafc' } } } }
    </script>
</head>
<body class="bg-lightbg text-gray-800 font-sans antialiased max-w-md mx-auto min-h-screen relative border-x border-gray-200 flex flex-col">

    <header class="bg-primary text-white p-4 sticky top-0 z-50 shadow-md flex items-center justify-between">
        <div class="flex items-center space-x-3">
            <h1 class="text-xl font-bold tracking-tight">My Bookings <span class="font-sinhala text-sm font-medium ml-1 text-blue-200">(මගේ වෙන් කිරීම්)</span></h1>
        </div>
        <button class="bg-white/20 hover:bg-white/30 px-2 py-1 rounded text-xs font-semibold transition border border-white/20">EN / සිං</button>
    </header>

    <main class="flex-1 p-4 flex flex-col pb-24">

        <div class="flex bg-gray-200/80 p-1 rounded-xl mb-5 shadow-inner">
            <button class="flex-1 text-gray-500 hover:text-gray-700 py-2.5 text-sm font-bold transition">
                Pending <span class="font-sinhala font-normal text-xs ml-1">(පොරොත්තු)</span>
            </button>
            <button class="flex-1 bg-white shadow-sm rounded-lg py-2.5 text-sm font-bold text-primary relative transition">
                Active <span class="font-sinhala font-normal text-xs ml-1">(ක්‍රියාකාරී)</span>
                <span class="absolute top-1 right-2 flex h-3 w-3">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-accent opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-3 w-3 bg-accent border-2 border-gray-200"></span>
                </span>
            </button>
            <button class="flex-1 text-gray-500 hover:text-gray-700 py-2.5 text-sm font-bold transition">
                Past <span class="font-sinhala font-normal text-xs ml-1">(පැරණි)</span>
            </button>
        </div>

        <div class="space-y-4">

            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden relative">
                <div class="absolute left-0 top-0 bottom-0 w-1.5 bg-accent"></div>
                
                <div class="p-4 pl-5">
                    <div class="flex justify-between items-start mb-3">
                        <div class="flex items-center space-x-3">
                            <img src="https://i.pravatar.cc/150?img=11" alt="Sunil" class="w-12 h-12 rounded-full object-cover border border-gray-200 shadow-sm">
                            <div>
                                <h3 class="font-bold text-lg text-gray-900 leading-tight">Sunil</h3>
                                <p class="text-xs font-medium text-gray-500">Mason <i class="fa-solid fa-star text-secondary text-[10px] ml-1"></i> 4.8</p>
                            </div>
                        </div>
                        <span class="bg-green-50 border border-green-100 text-green-700 text-[10px] font-bold px-2 py-1 rounded uppercase tracking-wide shadow-sm flex items-center">
                            <i class="fa-solid fa-check-circle mr-1"></i> Confirmed
                        </span>
                    </div>

                    <div class="bg-gray-50 rounded-xl p-3 mb-4 border border-gray-100">
                        <div class="flex items-center text-sm text-gray-700 font-medium mb-1.5">
                            <i class="fa-regular fa-calendar-check text-primary w-5 text-center mr-2"></i> 
                            Tomorrow, 8:00 AM
                        </div>
                        <div class="flex items-center text-sm text-gray-700 font-medium">
                            <i class="fa-solid fa-money-bill-wave text-primary w-5 text-center mr-2"></i> 
                            Est: Rs. 2500 / Day
                        </div>
                    </div>

                    <div class="flex space-x-2">
                        <a href="tel:0711565713" class="flex-1 bg-blue-50 text-blue-700 hover:bg-blue-100 py-3 rounded-xl font-bold text-sm text-center border border-blue-100 shadow-sm flex items-center justify-center transition">
                            <i class="fa-solid fa-phone mr-2"></i> Call Worker
                        </a>
                        <a href="https://wa.me/94711565713" class="flex-1 bg-[#25D366]/10 text-[#128C7E] hover:bg-[#25D366]/20 py-3 rounded-xl font-bold text-sm text-center border border-[#25D366]/20 shadow-sm flex items-center justify-center transition">
                            <i class="fa-brands fa-whatsapp text-lg mr-2"></i> WhatsApp
                        </a>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden relative opacity-90">
                <div class="absolute left-0 top-0 bottom-0 w-1.5 bg-secondary"></div>
                
                <div class="p-4 pl-5">
                    <div class="flex justify-between items-start mb-3">
                        <div class="flex items-center space-x-3">
                            <div class="w-12 h-12 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center text-xl shadow-sm border border-blue-200">
                                <i class="fa-solid fa-wrench"></i>
                            </div>
                            <div>
                                <h3 class="font-bold text-lg text-gray-900 leading-tight">Nimal</h3>
                                <p class="text-xs font-medium text-gray-500">Plumber</p>
                            </div>
                        </div>
                        <span class="bg-orange-50 border border-orange-100 text-orange-700 text-[10px] font-bold px-2 py-1 rounded uppercase tracking-wide shadow-sm flex items-center">
                            <i class="fa-solid fa-hourglass-half mr-1"></i> Pending
                        </span>
                    </div>

                    <p class="text-xs text-gray-500 mb-3 ml-1">Waiting for worker to accept your request...</p>

                    <button class="w-full border-2 border-red-100 text-red-500 hover:text-red-700 hover:bg-red-50 py-2.5 rounded-xl font-bold text-sm transition flex items-center justify-center">
                        <i class="fa-solid fa-xmark mr-2"></i> Cancel Request
                    </button>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden relative opacity-80 grayscale-[20%]">
                <div class="absolute left-0 top-0 bottom-0 w-1.5 bg-gray-400"></div>
                
                <div class="p-4 pl-5">
                    <div class="flex justify-between items-center mb-3">
                        <div class="flex items-center space-x-3">
                            <div class="w-10 h-10 rounded-full bg-yellow-100 text-yellow-600 flex items-center justify-center shadow-sm border border-yellow-200">
                                <i class="fa-solid fa-bolt"></i>
                            </div>
                            <div>
                                <h3 class="font-bold text-base text-gray-900 leading-tight">Rohan</h3>
                                <p class="text-[10px] font-medium text-gray-500">Electrician • Oct 12, 2024</p>
                            </div>
                        </div>
                        <span class="bg-gray-100 border border-gray-200 text-gray-600 text-[10px] font-bold px-2 py-1 rounded uppercase tracking-wide shadow-sm">
                            Completed
                        </span>
                    </div>

                    <a href="review_worker.html" class="w-full bg-primary hover:bg-blue-900 text-white py-2.5 rounded-xl font-bold text-sm transition flex items-center justify-center shadow-sm mt-2">
                        <i class="fa-regular fa-star mr-2"></i> Rate & Review Worker
                    </a>
                </div>
            </div>

        </div>
    </main>

    <nav class="bg-white border-t border-gray-200 flex justify-around p-3 fixed bottom-0 w-full max-w-md z-50 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
        <a href="client_home.html" class="flex flex-col items-center text-gray-400 hover:text-primary transition">
            <i class="fa-solid fa-house text-xl mb-1"></i>
            <span class="text-[10px] font-medium">Home</span>
        </a>
        <a href="#" class="flex flex-col items-center text-primary relative">
            <i class="fa-solid fa-clipboard-list text-xl mb-1"></i>
            <span class="text-[10px] font-medium">Bookings</span>
            <div class="absolute -top-1 -right-1 w-2 h-2 bg-secondary rounded-full border border-white"></div>
        </a>
        <a href="profile.html" class="flex flex-col items-center text-gray-400 hover:text-primary transition">
            <i class="fa-solid fa-user text-xl mb-1"></i>
            <span class="text-[10px] font-medium">Profile</span>
        </a>
    </nav>
</body>
</html>
