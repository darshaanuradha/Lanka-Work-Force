<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Workers - Lanka Work Force</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+Sinhala:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'], sinhala: ['Noto Sans Sinhala', 'sans-serif'] }, colors: { primary: '#1e3a5f', secondary: '#f59e0b', accent: '#10b981', lightbg: '#f8fafc' } } } }
    </script>
</head>
<body class="bg-lightbg text-gray-800 font-sans antialiased max-w-md mx-auto min-h-screen relative border-x border-gray-200 flex flex-col">

    <header class="bg-primary text-white p-4 sticky top-0 z-50 shadow-md">
        <div class="flex justify-between items-center mb-4">
            <div class="flex items-center space-x-2">
                <i class="fa-solid fa-helmet-safety text-secondary text-2xl"></i>
                <h1 class="text-xl font-bold tracking-tight">Lanka <span class="text-secondary">Work Force</span></h1>
            </div>
            <button class="bg-white/20 hover:bg-white/30 px-2 py-1 rounded text-xs font-semibold transition border border-white/20">EN / සිං</button>
        </div>
        
        <div class="relative shadow-sm">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <i class="fa-solid fa-location-dot text-red-400"></i>
            </div>
            <input type="text" placeholder="Search by city (e.g. Katugastota)..." 
                   class="w-full pl-10 pr-4 py-3 rounded-xl text-gray-900 font-medium focus:outline-none focus:ring-2 focus:ring-secondary border-0">
        </div>
    </header>

    <main class="flex-1 p-4 pb-20">
        <section class="mb-6">
            <div class="flex justify-between items-end mb-3">
                <h2 class="text-lg font-bold text-gray-800">What do you need? <span class="font-sinhala text-xs text-gray-500 font-normal ml-1">(ඔබට අවශ්‍ය කුමක්ද?)</span></h2>
            </div>
            <div class="grid grid-cols-4 gap-3 text-center">
                <a href="#" class="flex flex-col items-center justify-center p-3 bg-white hover:bg-orange-50 border border-gray-100 rounded-xl shadow-sm transition group">
                    <div class="w-12 h-12 rounded-full bg-orange-100 text-orange-600 flex items-center justify-center mb-2 group-hover:scale-110 transition"><i class="fa-solid fa-trowel text-xl"></i></div>
                    <span class="text-xs font-bold text-gray-700">Mason</span>
                </a>
                <a href="#" class="flex flex-col items-center justify-center p-3 bg-white hover:bg-green-50 border border-gray-100 rounded-xl shadow-sm transition group">
                    <div class="w-12 h-12 rounded-full bg-green-100 text-green-600 flex items-center justify-center mb-2 group-hover:scale-110 transition"><i class="fa-solid fa-seedling text-xl"></i></div>
                    <span class="text-xs font-bold text-gray-700">Laborer</span>
                </a>
                <a href="#" class="flex flex-col items-center justify-center p-3 bg-white hover:bg-blue-50 border border-gray-100 rounded-xl shadow-sm transition group">
                    <div class="w-12 h-12 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center mb-2 group-hover:scale-110 transition"><i class="fa-solid fa-wrench text-xl"></i></div>
                    <span class="text-xs font-bold text-gray-700">Plumber</span>
                </a>
                <a href="#" class="flex flex-col items-center justify-center p-3 bg-white hover:bg-yellow-50 border border-gray-100 rounded-xl shadow-sm transition group">
                    <div class="w-12 h-12 rounded-full bg-yellow-100 text-yellow-600 flex items-center justify-center mb-2 group-hover:scale-110 transition"><i class="fa-solid fa-bolt text-xl"></i></div>
                    <span class="text-xs font-bold text-gray-700">Electric</span>
                </a>
            </div>
        </section>

        <section>
            <h2 class="text-lg font-bold text-gray-800 mb-3">Top Workers Nearby <span class="font-sinhala text-xs text-gray-500 font-normal ml-1">(අසල සිටින සේවකයින්)</span></h2>
            <div class="space-y-3">
                <a href="worker_profile.html" class="flex items-center p-3 bg-white rounded-2xl shadow-sm border border-gray-100 hover:shadow-md transition">
                    <div class="relative">
                        <img src="https://i.pravatar.cc/150?img=11" alt="Sunil" class="w-16 h-16 rounded-full object-cover border-2 border-gray-100">
                        <div class="absolute bottom-0 right-0 w-4 h-4 bg-green-500 border-2 border-white rounded-full"></div>
                    </div>
                    <div class="ml-4 flex-1">
                        <h3 class="font-bold text-lg text-gray-900 leading-tight">Sunil</h3>
                        <p class="text-sm font-medium text-secondary">Mason <i class="fa-solid fa-star text-[10px] ml-1"></i> 4.8</p>
                        <p class="text-xs text-gray-500 mt-1"><i class="fa-solid fa-location-dot text-gray-400 mr-1"></i> Katugastota • Rs. 2500/day</p>
                    </div>
                    <div class="w-8 h-8 bg-gray-50 rounded-full flex items-center justify-center text-gray-400"><i class="fa-solid fa-chevron-right text-sm"></i></div>
                </a>
            </div>
        </section>
    </main>

    <nav class="bg-white border-t border-gray-200 flex justify-around p-3 fixed bottom-0 w-full max-w-md z-50 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
        <a href="#" class="flex flex-col items-center text-primary relative">
            <i class="fa-solid fa-house text-xl mb-1"></i>
            <span class="text-[10px] font-medium">Home</span>
            <div class="absolute -top-1 -right-1 w-2 h-2 bg-secondary rounded-full border border-white"></div>
        </a>
        <a href="client_bookings.html" class="flex flex-col items-center text-gray-400 hover:text-primary transition">
            <i class="fa-solid fa-clipboard-list text-xl mb-1"></i>
            <span class="text-[10px] font-medium">Bookings</span>
        </a>
        <a href="#" class="flex flex-col items-center text-gray-400 hover:text-primary transition">
            <i class="fa-solid fa-user text-xl mb-1"></i>
            <span class="text-[10px] font-medium">Profile</span>
        </a>
    </nav>
</body>
</html>
