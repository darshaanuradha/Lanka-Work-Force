<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review Worker - Lanka Work Force</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+Sinhala:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'], sinhala: ['Noto Sans Sinhala', 'sans-serif'] }, colors: { primary: '#1e3a5f', secondary: '#f59e0b', accent: '#10b981', lightbg: '#f8fafc' } } } }
    </script>
    <style>
        .star.active { color: #facc15; } /* Tailwind yellow-400 */
        .tag-btn.active.positive { background-color: #ecfdf5; border-color: #10b981; color: #047857; }
        .tag-btn.active.negative { background-color: #fef2f2; border-color: #ef4444; color: #b91c1c; }
    </style>
</head>
<body class="bg-lightbg text-gray-800 font-sans antialiased max-w-md mx-auto min-h-screen relative border-x border-gray-200 flex flex-col">

    <header class="bg-white p-4 sticky top-0 z-50 flex items-center justify-between border-b border-gray-100 shadow-sm">
        <a href="client_bookings.html" class="w-10 h-10 flex items-center justify-center rounded-full bg-gray-50 text-gray-600 hover:bg-gray-100 transition"><i class="fa-solid fa-xmark"></i></a>
        <h1 class="text-lg font-bold text-gray-800 tracking-tight">Leave a Review</h1>
        <button class="bg-primary/10 text-primary hover:bg-primary/20 px-3 py-1.5 rounded-full text-xs font-semibold transition">EN / සිං</button>
    </header>

    <main class="flex-1 p-5 overflow-y-auto pb-24">

        <div class="flex items-center space-x-3 bg-white p-3 rounded-xl border border-gray-200 shadow-sm mb-6">
            <img src="https://i.pravatar.cc/150?img=11" alt="Sunil" class="w-12 h-12 rounded-full object-cover border border-gray-200">
            <div>
                <p class="text-xs text-gray-500 font-medium">You are rating:</p>
                <h2 class="font-bold text-gray-900 text-sm">Sunil (Mason)</h2>
            </div>
        </div>

        <form action="client_bookings.html" method="POST" id="review-form">
            <input type="hidden" name="rating" id="rating-input" value="0" required>
            <input type="hidden" name="quick_tags" id="tags-input" value="">

            <div class="text-center mb-8">
                <h3 class="text-base font-bold text-gray-800 mb-1">How was the service?</h3>
                <p class="font-sinhala text-sm text-gray-500 mb-4">(සේවාව කෙසේද?)</p>
                
                <div class="flex justify-center space-x-2" id="star-container">
                    <i class="fa-solid fa-star text-4xl text-gray-300 cursor-pointer transition star" data-value="1"></i>
                    <i class="fa-solid fa-star text-4xl text-gray-300 cursor-pointer transition star" data-value="2"></i>
                    <i class="fa-solid fa-star text-4xl text-gray-300 cursor-pointer transition star" data-value="3"></i>
                    <i class="fa-solid fa-star text-4xl text-gray-300 cursor-pointer transition star" data-value="4"></i>
                    <i class="fa-solid fa-star text-4xl text-gray-300 cursor-pointer transition star" data-value="5"></i>
                </div>
                <p id="rating-text" class="text-sm font-bold text-secondary mt-3 min-h-[20px]"></p>
            </div>

            <hr class="border-gray-200 mb-6">

            <div class="mb-8">
                <div class="flex justify-between items-end mb-4">
                    <div>
                        <h3 class="text-base font-bold text-gray-800 mb-1">Quick Feedback</h3>
                        <p class="font-sinhala text-xs text-gray-500">(ඉක්මන් ප්‍රතිචාර)</p>
                    </div>
                    <span class="text-[10px] bg-blue-50 text-blue-600 px-2 py-1 rounded font-bold uppercase tracking-wide">Select multiple</span>
                </div>

                <div class="flex flex-wrap gap-2.5" id="tags-container">
                    <button type="button" class="tag-btn positive flex flex-col items-start px-3 py-2 bg-white border border-gray-200 rounded-xl shadow-sm transition w-[calc(50%-5px)] text-left" data-tag="on-time">
                        <span class="font-bold text-sm mb-0.5"><i class="fa-solid fa-clock text-accent mr-1.5"></i>On Time</span>
                        <span class="font-sinhala text-xs text-gray-500 tag-subtext">(වේලාවට වැඩ)</span>
                    </button>
                    <button type="button" class="tag-btn positive flex flex-col items-start px-3 py-2 bg-white border border-gray-200 rounded-xl shadow-sm transition w-[calc(50%-5px)] text-left" data-tag="skilled">
                        <span class="font-bold text-sm mb-0.5"><i class="fa-solid fa-hammer text-blue-500 mr-1.5"></i>Highly Skilled</span>
                        <span class="font-sinhala text-xs text-gray-500 tag-subtext">(ඉතා දක්ෂයි)</span>
                    </button>
                    <button type="button" class="tag-btn positive flex flex-col items-start px-3 py-2 bg-white border border-gray-200 rounded-xl shadow-sm transition w-[calc(50%-5px)] text-left" data-tag="friendly">
                        <span class="font-bold text-sm mb-0.5"><i class="fa-solid fa-face-smile text-secondary mr-1.5"></i>Friendly</span>
                        <span class="font-sinhala text-xs text-gray-500 tag-subtext">(සුහදශීලී)</span>
                    </button>
                    <button type="button" class="tag-btn positive flex flex-col items-start px-3 py-2 bg-white border border-gray-200 rounded-xl shadow-sm transition w-[calc(50%-5px)] text-left" data-tag="clean">
                        <span class="font-bold text-sm mb-0.5"><i class="fa-solid fa-broom text-teal-500 mr-1.5"></i>Clean Work</span>
                        <span class="font-sinhala text-xs text-gray-500 tag-subtext">(පිරිසිදුයි)</span>
                    </button>

                    <button type="button" class="tag-btn negative flex flex-col items-start px-3 py-2 bg-white border border-gray-200 rounded-xl shadow-sm transition w-[calc(50%-5px)] text-left mt-2" data-tag="late">
                        <span class="font-bold text-sm mb-0.5"><i class="fa-solid fa-stopwatch text-red-500 mr-1.5"></i>Arrived Late</span>
                        <span class="font-sinhala text-xs text-gray-500 tag-subtext">(ප්‍රමාදයි)</span>
                    </button>
                    <button type="button" class="tag-btn negative flex flex-col items-start px-3 py-2 bg-white border border-gray-200 rounded-xl shadow-sm transition w-[calc(50%-5px)] text-left mt-2" data-tag="messy">
                        <span class="font-bold text-sm mb-0.5"><i class="fa-solid fa-trash-can text-orange-500 mr-1.5"></i>Left a Mess</span>
                        <span class="font-sinhala text-xs text-gray-500 tag-subtext">(අපිරිසිදුයි)</span>
                    </button>
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-800 mb-1">
                    Write a Review <span class="text-xs text-gray-400 font-normal ml-1">(Optional)</span>
                </label>
                <textarea name="comment" rows="3" placeholder="Tell others about your experience..." class="w-full p-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-secondary font-medium text-gray-700 bg-gray-50 resize-none"></textarea>
            </div>

            <div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white p-4 border-t border-gray-100 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)] z-50">
                <button type="submit" id="submit-btn" disabled class="w-full py-4 rounded-xl text-lg font-bold text-white bg-gray-300 transition shadow flex justify-center items-center">
                    Submit Review <i class="fa-solid fa-paper-plane ml-2 text-sm"></i>
                </button>
            </div>
        </form>

    </main>

    <script>
        // Star Rating Logic
        const stars = document.querySelectorAll('.star');
        const ratingInput = document.getElementById('rating-input');
        const ratingText = document.getElementById('rating-text');
        const submitBtn = document.getElementById('submit-btn');
        const ratingPhrases = ["Poor", "Fair", "Good", "Very Good", "Excellent"];

        stars.forEach((star, index) => {
            star.addEventListener('click', () => {
                const ratingValue = index + 1;
                ratingInput.value = ratingValue;
                
                stars.forEach((s, i) => {
                    if (i < ratingValue) {
                        s.classList.add('active'); s.classList.remove('text-gray-300');
                    } else {
                        s.classList.remove('active'); s.classList.add('text-gray-300');
                    }
                });

                ratingText.textContent = ratingPhrases[index];
                submitBtn.disabled = false;
                submitBtn.classList.remove('bg-gray-300');
                submitBtn.classList.add('bg-primary', 'hover:bg-blue-900', 'active:scale-95');
            });
        });

        // Quick-Tap Tags Logic
        const tagBtns = document.querySelectorAll('.tag-btn');
        const tagsInput = document.getElementById('tags-input');
        let selectedTags = [];

        tagBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const tagValue = btn.getAttribute('data-tag');
                const subtext = btn.querySelector('.tag-subtext');
                
                btn.classList.toggle('active');
                
                if (btn.classList.contains('active')) {
                    selectedTags.push(tagValue);
                    subtext.classList.remove('text-gray-500');
                    subtext.classList.add('opacity-80');
                } else {
                    selectedTags = selectedTags.filter(t => t !== tagValue);
                    subtext.classList.add('text-gray-500');
                    subtext.classList.remove('opacity-80');
                }
                tagsInput.value = selectedTags.join(',');
            });
        });
    </script>
</body>
</html>
