<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worker Dashboard - Lanka Work Force</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+Sinhala:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'], sinhala: ['Noto Sans Sinhala', 'sans-serif'] }, colors: { primary: '#1e3a5f', secondary: '#f59e0b', accent: '#10b981', lightbg: '#f8fafc' } } } }
    </script>
</head>
<body class="bg-lightbg text-gray-800 font-sans antialiased max-w-md mx-auto min-h-screen relative border-x border-gray-200 flex flex-col">

    <header class="bg-primary text-white p-4 sticky top-0 z-50 shadow-md flex items-center justify-between">
        <div class="flex items-center space-x-3">
            <h1 class="text-xl font-bold tracking-tight">My Jobs <span class="font-sinhala text-sm font-medium ml-1 text-blue-200">(මගේ රැකියා)</span></h1>
        </div>
        <button class="bg-white/20 hover:bg-white/30 px-2 py-1 rounded text-xs font-semibold transition border border-white/20">EN / සිං</button>
    </header>

    <main class="flex-1 p-4 pb-20">
        <div class="flex bg-gray-200/80 p-1 rounded-xl mb-5 shadow-inner">
            <button class="flex-1 bg-white shadow-sm rounded-lg py-2.5 text-sm font-bold text-primary relative transition">
                New <span class="font-sinhala font-normal text-xs ml-1">(නව)</span>
                <span class="absolute -top-1 -right-1 flex h-4 w-4">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-secondary opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-4 w-4 bg-secondary text-[9px] text-white font-bold items-center justify-center border-2 border-white">1</span>
                </span>
            </button>
            <button class="flex-1 text-gray-500 hover:text-gray-700 py-2.5 text-sm font-bold transition">
                Active <span class="font-sinhala font-normal text-xs ml-1">(සක්‍රීය)</span>
            </button>
            <button class="flex-1 text-gray-500 hover:text-gray-700 py-2.5 text-sm font-bold transition">
                Done <span class="font-sinhala font-normal text-xs ml-1">(අවසන්)</span>
            </button>
        </div>

        <div class="bg-white rounded-2xl shadow-md border border-orange-200 overflow-hidden relative mb-4">
            <div class="absolute left-0 top-0 bottom-0 w-1.5 bg-secondary"></div>
            <div class="p-4 pl-5">
                <div class="flex justify-between items-start mb-3">
                    <div>
                        <h3 class="font-bold text-lg text-gray-900">Darsha Anuradha</h3>
                        <p class="text-sm text-gray-600 mt-0.5"><i class="fa-solid fa-location-dot text-red-500 mr-1.5"></i> Katugastota, Kandy</p>
                    </div>
                    <span class="bg-orange-50 border border-orange-100 text-orange-700 text-[10px] font-bold px-2 py-1 rounded uppercase tracking-wide shadow-sm animate-pulse">New Request</span>
                </div>

                <div class="bg-gray-50 rounded-xl p-3 mb-4 border border-gray-100">
                    <div class="flex items-center text-sm text-gray-700 font-bold mb-1">
                        <i class="fa-regular fa-calendar-check text-primary w-5 text-center mr-2"></i> 
                        Requested for: Tomorrow
                    </div>
                    <p class="font-sinhala text-xs text-gray-500 ml-7">(හෙට දිනය සඳහා)</p>
                </div>

                <div class="flex space-x-3 mt-2" id="action-buttons">
                    <button class="flex-1 border-2 border-red-100 text-red-600 hover:bg-red-50 py-3 rounded-xl font-bold transition flex flex-col items-center justify-center bg-white shadow-sm">
                        <span>Decline</span>
                        <span class="font-sinhala text-[10px] font-normal mt-0.5">(ප්‍රතික්ෂේප)</span>
                    </button>
                    <button onclick="acceptJob()" class="flex-[2] bg-accent hover:bg-green-600 text-white py-3 rounded-xl font-bold shadow-md transition flex flex-col items-center justify-center">
                        <span>Accept Job</span>
                        <span class="font-sinhala text-[10px] font-normal mt-0.5">(බාරගන්න)</span>
                    </button>
                </div>

                <div id="contact-details" class="hidden mt-4 pt-4 border-t border-gray-100">
                    <p class="text-xs text-gray-500 text-center mb-3">Job accepted! You can now contact the client.</p>
                    <div class="flex space-x-2">
                        <a href="tel:0712345678" class="flex-1 bg-blue-50 text-blue-700 py-3 rounded-xl font-bold text-sm text-center border border-blue-100 shadow-sm flex items-center justify-center transition hover:bg-blue-100">
                            <i class="fa-solid fa-phone mr-2"></i> Call
                        </a>
                        <a href="https://wa.me/94712345678" class="flex-1 bg-[#25D366]/10 text-[#128C7E] py-3 rounded-xl font-bold text-sm text-center border border-[#25D366]/20 shadow-sm flex items-center justify-center transition hover:bg-[#25D366]/20">
                            <i class="fa-brands fa-whatsapp text-lg mr-2"></i> WhatsApp
                        </a>
                    </div>
                    <button class="w-full mt-3 border-2 border-gray-200 text-gray-600 hover:text-gray-900 hover:bg-gray-50 py-3 rounded-xl font-bold transition flex items-center justify-center">
                        <i class="fa-solid fa-check-circle mr-2"></i> Mark as Completed
                    </button>
                </div>
            </div>
        </div>

        <a href="worker_status.html" class="flex items-center justify-between bg-blue-50 p-4 rounded-2xl border border-blue-100 shadow-sm mt-6">
            <div class="flex items-center">
                <div class="w-3 h-3 bg-accent rounded-full mr-3 shadow-sm border border-white"></div>
                <div>
                    <p class="font-bold text-sm text-primary">You are currently ONLINE</p>
                    <p class="text-[10px] text-gray-500">Tap to change availability or location</p>
                </div>
            </div>
            <i class="fa-solid fa-chevron-right text-gray-400"></i>
        </a>
    </main>

    <nav class="bg-white border-t border-gray-200 flex justify-around p-3 fixed bottom-0 w-full max-w-md z-50 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
        <a href="#" class="flex flex-col items-center text-primary relative">
            <i class="fa-solid fa-briefcase text-xl mb-1"></i>
            <span class="text-[10px] font-medium">My Jobs</span>
            <div class="absolute -top-1 -right-1 w-2 h-2 bg-secondary rounded-full border border-white"></div>
        </a>
        <a href="worker_earnings.html" class="flex flex-col items-center text-gray-400 hover:text-primary transition">
            <i class="fa-solid fa-wallet text-xl mb-1"></i>
            <span class="text-[10px] font-medium">Earnings</span>
        </a>
        <a href="#" class="flex flex-col items-center text-gray-400 hover:text-primary transition">
            <i class="fa-solid fa-user text-xl mb-1"></i>
            <span class="text-[10px] font-medium">Profile</span>
        </a>
    </nav>

    <script>
        function acceptJob() {
            document.getElementById('action-buttons').classList.add('hidden');
            document.getElementById('contact-details').classList.remove('hidden');
            const statusTag = document.querySelector('.bg-orange-50');
            statusTag.className = "bg-green-50 border border-green-100 text-green-700 text-[10px] font-bold px-2 py-1 rounded uppercase tracking-wide shadow-sm";
            statusTag.innerHTML = "<i class='fa-solid fa-check-circle mr-1'></i> Accepted";
        }
    </script>
</body>
</html>
