<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>
            {% block title %}Lanka Work Force{% endblock %}
        </title>
        <script src="https://cdn.tailwindcss.com"></script>
        <style>
        input[type="text"], input[type="password"], input[type="number"] {
            width: 100%;
            padding: 0.75rem;
            margin-top: 0.5rem;
            margin-bottom: 1rem;
            border: 1px solid #d1d5db;
            border-radius: 0.5rem;
            font-size: 1.125rem;
            text-align: center;
            letter-spacing: 0.05em;
        }
        input[type="checkbox"] {
            width: 1.25rem;
            height: 1.25rem;
            margin-right: 0.5rem;
        }
        label {
            font-weight: 600;
            color: #374151;
        }
        </style>
    </head>
    <body class="bg-gray-200 text-gray-900 font-sans antialiased min-h-screen flex justify-center">
        <main class="w-full max-w-md bg-white min-h-screen shadow-xl relative flex flex-col">
            <header class="bg-blue-600 text-white p-4 text-center shadow-md">
                <h1 class="text-2xl font-bold tracking-wide">Lanka Work Force</h1>
            </header>
            <div class="flex-grow p-6 flex flex-col justify-center">
                {% block content %}{% endblock %}
            </div>
        </main>
    </body>
</html>
