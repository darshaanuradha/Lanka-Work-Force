{% extends 'base.html' %}
{% block title %}Login - Lanka Work Force{% endblock %}
{% block content %}
    <div class="text-center mb-8">
        <h2 class="text-3xl font-extrabold text-gray-800">Welcome Back</h2>
        <p class="text-gray-500 mt-2">Enter your phone number and PIN</p>
    </div>
    <form method="POST" action="{% url 'accounts:login' %}" class="w-full">
        {% csrf_token %}
        <div class="mb-4 text-left">
            <label for="{{ form.username.id_for_label }}">Phone Number</label>
            {{ form.username }}
        </div>
        <div class="mb-6 text-left">
            <label for="{{ form.password.id_for_label }}">PIN / Password</label>
            {{ form.password }}
        </div>
        <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg shadow-lg transition duration-200 text-lg">
            Secure Login
        </button>
    </form>
    <div class="mt-8 text-center">
        <p class="text-gray-600">Don't have an account?</p>
        <a href="{% url 'accounts:register' %}"
           class="text-blue-600 font-bold hover:underline mt-1 inline-block">Register Here</a>
    </div>
{% endblock %}
