<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Welcome - Lanka Work Force</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+Sinhala:wght@400;600;700&display=swap"
              rel="stylesheet">
        <link rel="stylesheet"
              href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'], sinhala: ['Noto Sans Sinhala', 'sans-serif'] }, colors: { primary: '#1e3a5f', secondary: '#f59e0b', accent: '#10b981', lightbg: '#f8fafc' } } } }
        </script>
    </head>
    <body class="bg-primary text-white font-sans antialiased max-w-md mx-auto min-h-screen relative border-x border-primary flex flex-col justify-center items-center bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] px-6">
        <div class="text-center mb-12 transform transition hover:scale-105 duration-300">
            <div class="w-24 h-24 bg-white rounded-full flex items-center justify-center mx-auto mb-6 shadow-[0_0_30px_rgba(245,158,11,0.3)]">
                <i class="fa-solid fa-helmet-safety text-secondary text-5xl"></i>
            </div>
            <h1 class="text-4xl font-extrabold tracking-tight mb-2">
                Lanka <span class="text-secondary">Work Force</span>
            </h1>
            <p class="text-blue-200 font-medium text-sm">Empowering Local Talent</p>
        </div>
        <div class="w-full space-y-4 max-w-[280px]">
            <h2 class="text-center text-sm font-bold text-white/80 mb-4 uppercase tracking-widest">Select Language</h2>
            <form action="{% url 'set_language' %}" method="post" class="w-full">
                {% csrf_token %}
                <input type="hidden" name="next" value="{% url 'accounts:register' %}">
                <input type="hidden" name="language" value="en">
                <button type="submit"
                        class="w-full block bg-white text-primary py-4 rounded-2xl shadow-lg font-bold text-lg text-center hover:bg-gray-50 transition border-2 border-transparent active:border-secondary active:scale-95 mb-4">
                    English
                </button>
            </form>
            <form action="{% url 'set_language' %}" method="post" class="w-full">
                {% csrf_token %}
                <input type="hidden" name="next" value="{% url 'accounts:register' %}">
                <input type="hidden" name="language" value="si">
                <button type="submit"
                        class="w-full block bg-white text-primary py-4 rounded-2xl shadow-lg text-center hover:bg-gray-50 transition border-2 border-transparent active:border-secondary active:scale-95 flex flex-col items-center justify-center">
                    <span class="font-sinhala font-bold text-xl mb-0.5">සිංහල</span>
                    <span class="text-[10px] text-gray-500 font-medium">Sinhala</span>
                </button>
            </form>
        </div>
        <div class="absolute bottom-6 text-center w-full">
            <p class="text-[10px] text-blue-300/50">v1.0.0 &copy; 2026 Lanka Work Force</p>
        </div>
    </body>
</html>
